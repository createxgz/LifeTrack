server:
  port: 8088

spring:
  application:
    name: lifetrack

  datasource:
    url: jdbc:mysql://localhost:3306/lifetrack?useUnicode=true&characterEncoding=UTF-8&serverTimezone=Asia/Shanghai&useSSL=false
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:123456}
    driver-class-name: com.mysql.cj.jdbc.Driver

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  mail:
    host: smtp.qq.com
    port: 465
    username: ${SMTP_USERNAME:}
    password: ${SMTP_PASSWORD:}
    properties:
      mail.smtp.auth: true
      mail.smtp.ssl.enable: true

  quartz:
    job-store-type: memory
    properties:
      org.quartz.threadPool.threadCount: 5

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      logic-delete-field: isDeleted
      logic-delete-value: 1
      logic-not-delete-value: 0

springdoc:
  swagger-ui:
    path: /docs
    tags-sorter: alpha
  api-docs:
    path: /api-docs

jwt:
  secret: ${JWT_SECRET:lifetrack-jwt-secret-key-2026-please-change-in-production}
  expiration: 604800

logging:
  level:
    com.lifetrack: debug
